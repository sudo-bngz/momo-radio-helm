{{- if and .Values.secrets.external.enabled (not .Values.secrets.manual.enabled) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.envFromSecret }}
  labels:
    {{- include "momo-radio.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secrets.external.secretStoreName }}
    kind: {{ .Values.secrets.external.secretStoreKind }}
  target:
    name: {{ .Values.envFromSecret }}
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: {{ .Values.secrets.external.remoteRef }}
{{- end }}